services:
  db:
    image: postgres:15
    container_name: baristai_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  baristai-bot:
    build: .
    container_name: baristai_discord_bot
    restart: always
    environment:
      DATABASE_URL: postgresql://barista:supersecret@db:5432/barista_db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
    depends_on:
      - db
    command: python discord_bot.py

volumes:
  postgres_data:
